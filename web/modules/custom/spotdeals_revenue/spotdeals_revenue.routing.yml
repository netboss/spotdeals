spotdeals_revenue.suggest:
  path: '/suggest'
  defaults:
    _form: '\Drupal\spotdeals_revenue\Form\SpotdealsSuggestionForm'
    _title: 'Suggest a venue or deal'
  requirements:
    _permission: 'access content'

spotdeals_revenue.suggestions_admin:
  path: '/admin/content/spotdeals-suggestions'
  defaults:
    _controller: '\Drupal\spotdeals_revenue\Controller\SuggestionAdminController::overview'
    _title: 'SpotDeals suggestions'
  requirements:
    _permission: 'administer spotdeals revenue'

spotdeals_revenue.suggestion_approve:
  path: '/admin/content/spotdeals-suggestions/{suggestion_id}/approve'
  defaults:
    _controller: '\Drupal\spotdeals_revenue\Controller\SuggestionAdminController::approve'
  requirements:
    _permission: 'administer spotdeals revenue'
    _csrf_token: 'TRUE'
    suggestion_id: '\d+'

spotdeals_revenue.suggestion_needs_verification:
  path: '/admin/content/spotdeals-suggestions/{suggestion_id}/needs-verification'
  defaults:
    _controller: '\Drupal\spotdeals_revenue\Controller\SuggestionAdminController::needsVerification'
  requirements:
    _permission: 'administer spotdeals revenue'
    _csrf_token: 'TRUE'
    suggestion_id: '\d+'

